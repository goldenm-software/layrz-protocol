name: "Deploy versions"

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  prechecks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check tag format
        run: |
          if [[ ! "${GITHUB_REF}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${GITHUB_REF} does not match required format vX.Y.Z"
            exit 1
          fi
      
      - name: Check main branch
        run: |
          git fetch origin main

          if ! git merge-base --is-ancestor ${GITHUB_SHA} origin/main; then
            echo "Tag ${GITHUB_REF} is not based on the latest main branch"
            exit 1
          fi

  replicate-tags:
    runs-on: ubuntu-latest
    needs: prechecks

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Create and push mirror tags
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Add other tag namespaces here
          for prefix in go python dart; do
            git tag "$prefix/$TAG"
            git push origin "$prefix/$TAG"
          done

  deploy-python:
    runs-on: ubuntu-latest
    needs: prechecks
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7.2.0

      - name: Install dependencies
        working-directory: ./python
        run: uv sync

      - name: Build
        working-directory: ./python
        run: uv run python -m build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: ./python/dist

  deploy-dart:
    runs-on: ubuntu-latest
    needs: prechecks
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.41.9
          cache: true
          cache-sdk: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('dart/pubspec.yaml') }}

      - name: Copy changelog
        run: cp CHANGELOG.md dart/CHANGELOG.md

      - name: Install dependencies
        working-directory: dart
        run: flutter pub get

      - name: Dry run
        working-directory: dart
        run: flutter pub publish --dry-run

      - name: Publish to pub.dev
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Publish to pub.dev
        working-directory: dart
        run: flutter pub publish --force

  delete-tag:
    runs-on: ubuntu-latest
    needs: [prechecks, replicate-tags, deploy-python, deploy-dart]
    if: failure()
    permissions:
      contents: write
    steps:
      - name: Rename tag when fails
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          NEW_TAG="failed-${TAG_NAME}-${TIMESTAMP}"
          git tag $NEW_TAG
          git push origin $NEW_TAG
          git push --delete origin $TAG_NAME

  create-release:
    needs: [replicate-tags, deploy-python, deploy-dart]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: goldenm-software/layrz-actions/.github/actions/changelog@v1
        with:
          post-comment: false
          comment-header: '## 📋 Release Notes'


      - name: Determine if pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}